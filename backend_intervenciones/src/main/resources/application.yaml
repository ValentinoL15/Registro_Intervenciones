spring:
  application:
    name: intervenciones
  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 15MB
  data:
    web:
      pageable:
        default-page-size: 100
        max-page-size: 2000
  mail:
    host: smtp.gmail.com
    port: 465
    username: escuela.losbuenoshijos@gmail.com
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
  main:
    allow-bean-definition-overriding: true

  datasource:
    url: ${DB_URL_APP}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

cloudinary:
  cloud-name: ${CLOUD_NAME}
  api-key: ${API_KEY}
  api-secret: ${API_SECRET}

security:
  jwt:
    private:
      key: ${PRIVATE_KEY}
    user:
      generator: ${USER_GENERATOR}
    expiration: 2592000000

logging:
  level:
    org.springframework.security: DEBUG

server:
  port: 8080